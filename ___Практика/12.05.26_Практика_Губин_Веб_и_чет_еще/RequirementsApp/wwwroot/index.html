<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Требования – Система управления</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Система управления требованиями</h1>
        <div class="toolbar">
            <input type="text" id="search" placeholder="Поиск...">
            <select id="statusFilter">
                <option value="">Все статусы</option>
                <option value="Draft">Черновик</option>
                <option value="InApproval">На согласовании</option>
                <option value="Approved">Утверждено</option>
                <option value="Rejected">Отклонено</option>
            </select>
            <button onclick="loadRequirements()">Найти</button>
            <button onclick="location.href='create.html'">+ Новое требование</button>
        </div>
        <table id="requirementsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Приоритет</th>
                    <th>Статус</th>
                    <th>Автор</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
