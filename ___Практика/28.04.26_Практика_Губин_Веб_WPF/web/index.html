<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг температуры</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Мониторинг температуры</h1>
            <h5>Данные получены из wpf приложения</h5>
            <p>Последние 10 показаний в реальном времени</p>
        </div>
        <div class="table-wrapper">
            <table id="tempTable">
                <thead>
                    <tr>
                        <th>🌡️ Температура (°C)</th>
                        <th>⏱️ Время получения</th>
                    </tr>
                </thead>
                <tbody id="tempBody">
                    <tr>
                        <td colspan="2">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="footer">
            <span>Автообновление каждые 2.5 секунды</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
